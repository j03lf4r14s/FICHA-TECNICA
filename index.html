<!DOCTYPE html>
<html lang="pt-BR">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{

</head>

<body>

<div class="container">

<div class="header">
<h1><i class="fa-regular fa-clipboard-check"></i> Instalação Fibra PRO</h1>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">

<div>
<label>Nome do Cliente</label>
<input id="cliente">
</div>

<div>
<label>Nome do Técnico</label>
<input id="tecnico">
</div>

<div>
<label>Fiscal do Dia</label>
<input id="fiscal">
</div>

<div>
<label>Data da Visita</label>
<input type="date" id="data">
</div>

</div>

<h3 style="color:#ff0000">Checklist de Verificação</h3>

<table>

<thead>
<tr>
<th>#</th>
<th>Verificação</th>
<th style="text-align:right">Status</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<label>Observações</label>

<textarea id="observacoes" maxlength="3000"></textarea>

<div id="contadorObs" style="text-align:right;font-size:11px;color:#666;">0 / 3000</div>

<label>Fotos da Instalação</label>

<div class="camera-controls">

<button class="action-btn" onclick="abrirCamera()">
<i class="fa-solid fa-camera"></i> Abrir Câmera
</button>

<button class="action-btn" onclick="abrirGaleria()">
<i class="fa-solid fa-image"></i> Galeria
</button>

</div>

<video id="camera" autoplay playsinline></video>

<div id="btnTirarFoto" style="display:none;gap:10px;margin-bottom:10px;">

<button class="pdf-btn" style="margin:0" onclick="tirarFoto()">Capturar Foto</button>

<button class="action-btn" onclick="fecharCamera()">Cancelar</button>

</div>

<input type="file" id="galeria" accept="image/*" multiple style="display:none">

<canvas id="canvas" style="display:none"></canvas>

<div id="preview"></div>

<button onclick="gerarPDF()" class="pdf-btn">Gerar Relatório PDF</button>

</div>

<script>

const verificacoes=[
"Acomodação da fibra na CTO",
"Identificação do DROP",
"CTO correta conforme projeto",
"Identificação da CTO",
"Organização interna da CTO",
"Trajeto do DROP",
"Fixação em fachada",
"Entrada do cabo na residência",
"Instalação do PTO",
"Teste WiFi",
"Parâmetros da fibra",
"Cliente orientado sobre WiFi",
"Organização geral da instalação",
"Uso de EPI pelo técnico",
"Registro fotográfico",
"Qualidade final da instalação"
];

const tabela=document.getElementById("tabela");

verificacoes.forEach((v,i)=>{

tabela.innerHTML+=`

<tr>
<td>${i+1}</td>
<td>${v}</td>
<td>

<div class="btn-group">
<button class="status-btn" data-valor="Sim" onclick="selecionar(this)">Sim</button>
<button class="status-btn" data-valor="Não" onclick="selecionar(this)">Não</button>
<button class="status-btn" data-valor="N/A" onclick="selecionar(this)">N/A</button>
</div>

</td>
</tr>

`;

});

function selecionar(btn){

btn.parentNode.querySelectorAll(".status-btn")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

}

const obs=document.getElementById("observacoes");
const contador=document.getElementById("contadorObs");

obs.addEventListener("input",function(){
contador.innerText=obs.value.length+" / 3000";
});

let fotos=[];
let video=document.getElementById("camera");
let streamCamera=null;

async function abrirCamera(){

streamCamera=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

video.srcObject=streamCamera;
video.style.display="block";

document.getElementById("btnTirarFoto").style.display="flex";

}

function fecharCamera(){

if(streamCamera){
streamCamera.getTracks().forEach(t=>t.stop());
}

video.style.display="none";
document.getElementById("btnTirarFoto").style.display="none";

}

function tirarFoto(){

if(fotos.length>=15){
alert("Limite de 15 fotos");
return;
}

let canvas=document.getElementById("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

fotos.push(canvas.toDataURL("image/jpeg",0.7));

mostrarPreview();

}

function abrirGaleria(){
document.getElementById("galeria").click();
}

document.getElementById("galeria").onchange=function(e){

for(let file of e.target.files){

if(fotos.length>=15)break;

let reader=new FileReader();

reader.onload=(ev)=>{
fotos.push(ev.target.result);
mostrarPreview();
};

reader.readAsDataURL(file);

}

};

function mostrarPreview(){

const p=document.getElementById("preview");

p.innerHTML="";

fotos.forEach((foto,index)=>{

p.innerHTML+=`

<div class="foto-box">
<img src="${foto}">
<button class="btn-excluir" onclick="removerFoto(${index})">✖</button>
</div>

`;

});

}

function removerFoto(index){

fotos.splice(index,1);
mostrarPreview();

}

async function compartilharPDF(doc){

let tecnico=document.getElementById("tecnico").value.trim();
let cliente=document.getElementById("cliente").value.trim();
let data=document.getElementById("data").value;

if(!tecnico) tecnico="Tecnico";
if(!cliente) cliente="Cliente";
if(!data) data="Data";

let nomeArquivo=tecnico+"_"+cliente+"_"+data+".pdf";

nomeArquivo=nomeArquivo.replace(/\s+/g,"_");

const blob=doc.output("blob");

const file=new File([blob],nomeArquivo,{type:"application/pdf"});

if(navigator.canShare && navigator.canShare({files:[file]})){

try{

await navigator.share({
title:"Relatório de Instalação",
text:"Relatório da instalação técnica",
files:[file]
});

}catch(e){
console.log("Compartilhamento cancelado");
}

}else{

doc.save(nomeArquivo);

}

}

function gerarPDF(){

const {jsPDF}=window.jspdf;

let doc=new jsPDF();

doc.setFontSize(16);
doc.text("RELATÓRIO DE INSTALAÇÃO FIBRA",20,20);

doc.setFontSize(10);

doc.text("Cliente: "+document.getElementById("cliente").value,20,35);
doc.text("Técnico: "+document.getElementById("tecnico").value,20,42);
doc.text("Fiscal: "+document.getElementById("fiscal").value,20,49);
doc.text("Data: "+document.getElementById("data").value,20,56);

let dados=verificacoes.map((v,i)=>{

let btn=document.querySelectorAll("#tabela tr")[i].querySelector(".selected");

return[
i+1,
v,
btn?btn.dataset.valor:"---"
];

});

doc.autoTable({
startY:65,
head:[["#","Verificação","Status"]],
body:dados,
headStyles:{fillColor:[255,0,0]}
});

let currentY=doc.lastAutoTable.finalY+10;

doc.text("Observações:",20,currentY);

let texto=doc.splitTextToSize(obs.value||"Sem observações.",170);

doc.text(texto,20,currentY+7);

currentY+=texto.length*5+15;

for(let i=0;i<fotos.length;i++){

if(currentY>240){
doc.addPage();
currentY=20;
}

doc.addImage(fotos[i],"JPEG",20,currentY,80,60);

if(fotos[i+1]){
doc.addImage(fotos[i+1],"JPEG",110,currentY,80,60);
i++;
}

currentY+=70;

}

compartilharPDF(doc);

}

</script>

</body>
</html>
